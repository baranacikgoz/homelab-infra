name: 🤖 Claude AI Flutter Developer

on:
  issues:
    types: [labeled]

jobs:
  setup:
    name: 🔍 Parse Label & Select Model
    if: startsWith(github.event.label.name, 'claude-ai-flutter-')
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.parse.outputs.tier }}
      model: ${{ steps.parse.outputs.model }}
    steps:
      - name: 🛠️ Parse Label
        id: parse
        run: |
          LABEL="${{ github.event.label.name }}"
          # Format: claude-ai-flutter-TIER
          TIER="${LABEL##*-}"
          
          case "$TIER" in
            light) MODEL="haiku" ;;
            mid)   MODEL="sonnet" ;;
            high)  MODEL="opus" ;;
            *)     MODEL="sonnet" ;;
          esac
          
          echo "tier=$TIER" >> $GITHUB_OUTPUT
          echo "model=$MODEL" >> $GITHUB_OUTPUT

  flutter-developer:
    name: 🚀 Flutter Agent (${{ needs.setup.outputs.tier }})
    needs: setup
    runs-on: arc-runners-flutter
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 💬 Contextualize Task
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q .body)
          ISSUE_TITLE=$(gh issue view ${{ github.event.issue.number }} --json title -q .title)
          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "$ISSUE_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          echo "$ISSUE_TITLE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🧠 Unleash Flutter Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_INTERACTIVE: "false"
        run: |
          # Define the prompt using a Here-Doc for shell stability
          read -r -d '' CLAUDE_PROMPT <<EOF || true
          You are a Senior Flutter/Dart Developer specializing in cross-platform excellence and clean UI.
          
          Your mission: Resolve GitHub Issue #${{ github.event.issue.number }}: '$ISSUE_TITLE'.
          
          Context:
          $ISSUE_BODY
          
          Instructions:
          1. Strictly adhere to rules defined in CLAUDE.md.
          2. Output your 'Plan of Action' to the console.
          3. Implement your changes.
          4. Verify changes, see \`.agent/workflows/verify-feature.md\`.
          5. Create a branch 'claude-fix/flutter-issue-${{ github.event.issue.number }}'.
          6. Push and create a Pull Request with 'Fixes #${{ github.event.issue.number }}'.
          7. The PR MUST have a 'Decisions & Rationale' section explaining your architectural choices.
          8. If you repeatedly fail to solve the problem, you should stop and report the failure with the root cause, open the PR with the current state and ask for human help. Do not 'loop' on the same failed approach which will result in API Credit waste.
          EOF
          
          stdbuf -oL -eL claude --verbose --dangerously-skip-permissions --model "${{ needs.setup.outputs.model }}" -p "$CLAUDE_PROMPT" 2>&1 | tee claude-execution.log

      - name: 💾 Archive Agent Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-flutter-logs-${{ github.event.issue.number }}-${{ github.run_id }}
          path: |
            claude-execution.log
            ~/.claude/
          retention-days: 14
