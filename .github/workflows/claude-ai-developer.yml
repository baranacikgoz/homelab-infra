name: 🤖 Claude AI Developer

on:
  issues:
    types: [labeled]

jobs:
  setup:
    name: 🔍 Parse Label & Select Model
    if: startsWith(github.event.label.name, 'claudeai-')
    runs-on: ubuntu-latest
    outputs:
      language: ${{ steps.parse.outputs.language }}
      tier: ${{ steps.parse.outputs.tier }}
      model: ${{ steps.parse.outputs.model }}
    steps:
      - name: 🛠️ Parse Label
        id: parse
        run: |
          LABEL="${{ github.event.label.name }}"
          # Format: claudeai-LANGUAGE-TIER
          IFS='-' read -r PREFIX LANGUAGE TIER <<< "$LABEL"
          
          # Map Tiers to Anthropic Models
          case "$TIER" in
            light) MODEL="claude-3-5-haiku-20241022" ;;
            mid)   MODEL="claude-3-5-sonnet-20241022" ;;
            high)  MODEL="claude-3-7-sonnet-20250219" ;;
            ultra) MODEL="claude-3-opus-20240229" ;;
            *)     MODEL="claude-3-5-sonnet-20241022" ;; # Default to Sonnet
          esac
          
          echo "language=$LANGUAGE" >> $GITHUB_OUTPUT
          echo "tier=$TIER" >> $GITHUB_OUTPUT
          echo "model=$MODEL" >> $GITHUB_OUTPUT

  ai-developer-task:
    name: 🧠 Execute ${{ needs.setup.outputs.language }} Agent (${{ needs.setup.outputs.tier }})
    needs: setup
    runs-on: arc-runners-${{ needs.setup.outputs.language }}
    
    # Required for Claude to use the `gh` cli inside the container
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 💬 Contextualize Task
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q .body)
          ISSUE_TITLE=$(gh issue view ${{ github.event.issue.number }} --json title -q .title)
          
          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "$ISSUE_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          echo "$ISSUE_TITLE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🧠 Unleash Claude Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_INTERACTIVE: "false"
        run: |
          echo "Executing autonomous task for Issue #${{ github.event.issue.number }}..."
          echo "Intelligence Tier: ${{ needs.setup.outputs.tier }}"
          echo "Language Target: ${{ needs.setup.outputs.language }}"
          echo "Model Override: ${{ needs.setup.outputs.model }}"
          
          # Master prompt with Tier awareness
          claude --dangerously-skip-permissions --model "${{ needs.setup.outputs.model }}" -p "You are an autonomous AI Developer operating at the ${{ needs.setup.outputs.tier }} intelligence level. 
          Your task is to resolve GitHub Issue #${{ github.event.issue.number }}: '$ISSUE_TITLE'. 
          
          Issue Details:
          $ISSUE_BODY
          
          Instructions:
          1. Strictly adhere to rules defined in CLAUDE.md.
          2. Implement your changes. Do not forget to verify see `.agent/workflows/verify-feature.md`.
          3. Once confident, create a new branch named 'claude-fix/issue-${{ github.event.issue.number }}' unless explicitly told to use the same branch & same PR.
          4. Commit your changes and push the branch to origin.
          5. Use the 'gh' CLI.
          7. The PR description MUST include:
             - 'Fixes #${{ github.event.issue.number }}'
             - A 'Decisions & Rationale' section explaining exactly WHY you chose this implementation for this $ISSUE_TITLE.
             - Intelligence Tier used: ${{ needs.setup.outputs.tier }} (${{ needs.setup.outputs.model }})
          
          You have full autonomy to use bash, git, and standard tooling to complete this. Do not stop until the Pull Request is confirmed created."