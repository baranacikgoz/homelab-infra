name: 🤖 Claude AI .NET Developer

on:
  issues:
    types: [labeled]

jobs:
  claude-ai-dev:
    if: github.event.label.name == 'claude-ai'
    # Use our specialized self-hosted labels
    runs-on: [self-hosted, linux, arm64, dotnet-dev]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 💬 Ingest Issue Context
        id: context
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q .body)
          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "$ISSUE_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🚀 Execute Claude AI Task
        run: |
          # 1. Start Claude Code in headless mode
          # 2. Feeding the issue body as the prompt
          # 3. Ensuring it respects our --yes flag for autonomous execution
          echo "Starting autonomous refactoring..."
          claude --yes "$ISSUE_BODY"

      - name: 🏗️ Verify Changes (Safety Block)
        run: |
          echo "Running safety builds and tests..."
          dotnet build
          dotnet test

      - name: 🔄 Submit Pull Request
        if: success()
        run: |
          BRANCH_NAME="claude-ai/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH_NAME"
          git add .
          git commit -m "🤖 AI: Automated refactoring for issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME"
          
          gh pr create \
            --title "🤖 AI Refactor: ${{ github.event.issue.title }}" \
            --body "This PR was automatically generated by Claude AI following instructions in #${{ github.event.issue.number }}" \
            --base main \
            --head "$BRANCH_NAME"
