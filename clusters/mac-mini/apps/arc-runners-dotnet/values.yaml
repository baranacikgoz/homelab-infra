# Scale Set Configuration for the Claude .NET Developer
# Aligned with T-Shirt Medium and Governance Anti-OOM

gha-runner-scale-set:
  githubConfigUrl: "https://github.com/baranacikgoz/modular-monolith-ddd-vsa-webapi"
  githubConfigSecret: arc-github-app-secret
  runnerScaleSetName: "arc-runners-dotnet"
  
  # Cross-namespace Controller Discovery
  controllerServiceAccount:
    namespace: arc-system
    name: arc-controller-gha-rs-controller
  
  # Safety boundaries for Mac Mini M4 resource pool
  minRunners: 0
  maxRunners: 2
  
  # Service account to execute high-privilege build actions if needed
  # Default is fine for now
  
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "claude-agent-role"
        vault.hashicorp.com/agent-inject-secret-config.env: "apps/data/production/claude-agent/config"
        vault.hashicorp.com/agent-inject-template-config.env: |
          {{- with secret "apps/data/production/claude-agent/config" -}}
          {{- range $k, $v := .Data.data -}}
          export {{ $k }}="{{ $v }}"
          {{ end -}}
          {{- end -}}
    spec:
      serviceAccountName: claude-agent
      containers:
        - name: runner
          image: ghcr.io/baranacikgoz/homelab-infra/claude-dotnet-developer:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c", "if [ -f /vault/secrets/config.env ]; then . /vault/secrets/config.env; fi; exec /home/runner/run.sh"]
          # Performance Mode (Elite): 6.0 CPU Burst / 4Gi RAM
          resources:
            requests:
              cpu: 1500m
              memory: 2Gi
            limits:
              cpu: 6000m
              memory: 4Gi
          env:
            - name: RUNNER_TAGS
              value: "claude-ai,dotnet-dev"
            - name: DOCKER_HOST
              value: unix:///var/run/dind/docker.sock
          volumeMounts:
            - name: dind-sock
              mountPath: /var/run/dind
            - name: mcp-config
              mountPath: /home/runner/.claude.json
              subPath: .claude.json
        - name: dind
          image: docker:27-dind
          # Scaled for Testcontainers (Postgres, RabbitMQ, etc. inside DinD)
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1.5Gi
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - dockerd
            - --host=unix:///var/run/dind/docker.sock
            - --host=tcp://127.0.0.1:2375
            - --tls=false
            - --group=123
          volumeMounts:
            - name: docker-graph-storage
              mountPath: /var/lib/docker
            - name: dind-sock
              mountPath: /var/run/dind
      volumes:
        - name: docker-graph-storage
          emptyDir: {}
        - name: dind-sock
          emptyDir: {}
        - name: mcp-config
          configMap:
            name: claude-mcp-config
