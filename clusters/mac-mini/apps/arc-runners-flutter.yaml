apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners-flutter
  namespace: argocd
  annotations:
    # Scale sets MUST start after the controller is ready
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: git@github.com:baranacikgoz/homelab-infra.git
    targetRevision: main
    path: clusters/mac-mini/apps/arc-runners-flutter
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Required for large Scale Set CRDs
      - ServerSideApply=true
