apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: arc-runners-ai-dotnet
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - provider: anthropic
            model: claude-sonnet-4-6
          - provider: anthropic
            model: claude-opus-4-6
          - provider: anthropic
            model: claude-haiku-4-5
          - provider: openai
            model: gpt-4o
          - provider: openai
            model: gpt-5.4
          - provider: openai
            model: gpt-5.4-mini
          - provider: openai
            model: gpt-5-codex
          - provider: google
            model: gemini-3.1-pro-preview
          - provider: deepseek
            model: deepseek-chat
          - provider: deepseek
            model: deepseek-reasoner
          - provider: ollama
            model: qwen2.5-coder-7b
            actualModel: qwen2.5-coder:7b
          - provider: ollama
            model: qwen2.5-coder-14b
            actualModel: qwen2.5-coder:14b
  template:
    metadata:
      name: 'arc-runners-ai-dotnet-{{.provider}}-{{.model}}'
    spec:
      project: default
      source:
        repoURL: git@github.com:baranacikgoz/homelab-infra.git
        targetRevision: main
        path: clusters/mac-mini/apps/arc-runners-ai-dotnet
        helm:
          values: |
            gha-runner-scale-set:
              runnerScaleSetName: "arc-runners-ai-dotnet-{{.provider}}-{{.model}}"
              runnerLabels:
                - "ai-dotnet-{{.provider}}-{{.actualModel | default .model}}"
                - "dotnet-dev"
              template:
                metadata:
                  annotations:
                    vault.hashicorp.com/agent-inject-template-config.env: |
                      {{`{{- with secret "apps/data/production/claude-agent/config" -}}` }}
                      {{`{{- range $k, $v := .Data.data -}}` }}
                      export {{`{{ $k }}`}}="{{`{{ $v }}`}}"
                      {{`{{- end -}}` }}
                      {{- if eq .provider "anthropic" }}
                      export ANTHROPIC_API_KEY="{{`{{ .Data.data.SK_ANTHROPIC_CI }}`}}"
                      {{- else if eq .provider "openai" }}
                      export ANTHROPIC_API_KEY="{{`{{ .Data.data.SK_OPENAI_CI }}`}}"
                      {{- else if eq .provider "google" }}
                      export ANTHROPIC_API_KEY="{{`{{ .Data.data.SK_GOOGLE_CI }}`}}"
                      {{- else if eq .provider "deepseek" }}
                      export ANTHROPIC_API_KEY="{{`{{ .Data.data.SK_DEEPSEEK_CI }}`}}"
                      {{- else if eq .provider "ollama" }}
                      export ANTHROPIC_API_KEY="{{`{{ .Data.data.SK_OLLAMA_CI }}`}}"
                      {{- end }}
                      {{`{{- end -}}` }}
                spec:
                  containers:
                    - name: runner
                      env:
                        - name: ANTHROPIC_BASE_URL
                          value: "http://litellm.litellm.svc.cluster.local:4000/v1"
      destination:
        server: https://kubernetes.default.svc
        namespace: arc-runners
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
