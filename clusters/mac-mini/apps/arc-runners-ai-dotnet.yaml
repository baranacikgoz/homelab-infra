apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: arc-runners-ai-dotnet
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - provider: anthropic
            model: claude-3-7-sonnet-20250219
          - provider: openai
            model: gpt-4o
          - provider: openai
            model: o3-mini
          - provider: google
            model: gemini-2.5-pro
          - provider: deepseek
            model: deepseek-chat
          - provider: deepseek
            model: deepseek-reasoner
          - provider: ollama
            model: qwen2.5-coder-7b
            actualModel: qwen2.5-coder:7b
  template:
    metadata:
      name: 'arc-runners-ai-dotnet-{{.provider}}-{{.model}}'
    spec:
      project: default
      source:
        repoURL: git@github.com:baranacikgoz/homelab-infra.git
        targetRevision: main
        path: clusters/mac-mini/apps/arc-runners-ai-dotnet
        helm:
          values: |
            gha-runner-scale-set:
              runnerScaleSetName: "arc-runners-ai-dotnet-{{.provider}}-{{.model}}"
              template:
                spec:
                  containers:
                    - name: runner
                      env:
                        - name: RUNNER_TAGS
                          value: "ai-dotnet-{{.provider}}-{{.actualModel | default .model}},dotnet-dev"
                        - name: ANTHROPIC_API_KEY
                          {{- if eq .provider "anthropic" }}
                          value: "${SK_ANTHROPIC_CI}"
                          {{- else if eq .provider "openai" }}
                          value: "${SK_OPENAI_CI}"
                          {{- else if eq .provider "google" }}
                          value: "${SK_GOOGLE_CI}"
                          {{- else if eq .provider "deepseek" }}
                          value: "${SK_DEEPSEEK_CI}"
                          {{- else if eq .provider "ollama" }}
                          value: "${SK_OLLAMA_CI}"
                          {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: arc-runners
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
